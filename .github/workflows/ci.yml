name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # Detect what changed to determine which jobs to run
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi

          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "docs=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BASE"..HEAD)

          code=false
          docs=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              src/*|test/*|*.props|*.slnx|.github/workflows/*) code=true ;;
            esac
            case "$file" in
              *.md|docs/*|skills/*) docs=true ;;
            esac
          done <<< "$CHANGED"

          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "docs=$docs" >> "$GITHUB_OUTPUT"

  # Lint markdown files
  markdownlint:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run markdownlint
        run: npx markdownlint-cli2 '**/*.md'

  # Build and test
  build:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Authenticate GitHub Packages
        run: dotnet nuget update source github-richlander --username richlander --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --configfile nuget.config

      - name: Build
        run: dotnet build DotnetRelease.slnx -c Release

      - name: Test
        run: dotnet test DotnetRelease.slnx -c Release --no-build

  # Pack on Ubuntu (pointer package, non-AOT fallback, and linux-x64 AOT)
  pack:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Authenticate GitHub Packages
        run: dotnet nuget update source github-richlander --username richlander --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --configfile nuget.config

      - name: Clean previous packages
        run: rm -rf artifacts/package

      - name: Pack pointer package
        run: dotnet pack src/Dotnet.Release.Tools -c Release -p:OfficialBuild=true

      - name: Pack non-AOT (any) package
        run: dotnet pack src/Dotnet.Release.Tools -c Release -r any -p:PublishAot=false -p:OfficialBuild=true

      - name: Pack linux-x64 AOT package
        run: dotnet pack src/Dotnet.Release.Tools -c Release -r linux-x64 -p:OfficialAotBuild=true

      - name: Smoke test
        run: |
          dotnet tool install -g Dotnet.Release.Tools --add-source artifacts/package/release --prerelease
          dotnet-release --help || true

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-linux-x64
          path: artifacts/package/release/*.nupkg
          if-no-files-found: error

  # RID-specific AOT builds (cross-platform matrix)
  pack-rid:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: win-arm64
            os: windows-latest
          - rid: linux-arm64
            os: ubuntu-24.04-arm
          - rid: osx-arm64
            os: macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Authenticate GitHub Packages
        run: dotnet nuget update source github-richlander --username richlander --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --configfile nuget.config

      - name: Pack RID-specific package
        run: dotnet pack src/Dotnet.Release.Tools -c Release -r ${{ matrix.rid }} -p:OfficialAotBuild=true

      - name: Upload RID package
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.rid }}
          path: artifacts/package/release/*.nupkg
          if-no-files-found: error
